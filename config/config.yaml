# ============================================================
# Plant Hybrid ASE Pipeline — Configuration File
# ============================================================
# Fill in paths and parameters before running the pipeline.
# Each section corresponds to one pipeline stage.
# Review outputs of each stage before proceeding to the next.
# ============================================================

# ── Sample sheet ─────────────────────────────────────────────
samples: "config/samples.tsv"

# ── Entry point ──────────────────────────────────────────────
# Define where your data enters the pipeline.
# Options:
#   fastq      → start from raw FASTQs (runs all stages)
#   trimmed    → start from trimmed FASTQs (skip fastqc_raw + trim)
#   bam        → start from aligned BAMs  (skip through align)
#   wasp_bam   → start from WASP BAMs     (skip through wasp)
#   counts     → start from phASER counts (phaser_sample only)
start_from: "fastq"


# ── VCF preparation ───────────────────────────────────────────
# Input VCF (bgzipped + tabix indexed).
# Can be single-sample or multi-sample:
#
#   Single-sample: VCF created by aligning Parent B to Parent A genome.
#                  One sample column (e.g. "Oh43") applied to all samples.
#                  Set vcf_sample to this one name for every row in samples.tsv.
#
#   Multi-sample:  One genotype column per hybrid sample (e.g. GATK joint calling).
#                  Set vcf_sample to the matching VCF column name per row.
vcf_raw: "resources/variants.vcf.gz"

# Outputs generated by vcf_prep rules (do not edit paths)
# vcf_star   → uncompressed, biallelic het SNPs, for STAR --varVCFfile
#              STAR reads REF/ALT only — 0/1 and 0|1 treated identically
# vcf_phaser → bgzipped + tabix indexed, biallelic het SNPs, for phASER
vcf_star:   "resources/variants_star.vcf"
vcf_phaser: "resources/variants_phased.vcf.gz"

# SNP directory for WASP standalone (ATAC-seq, ChIP-seq, MOA-seq only)
# One file per chromosome: chr1.snps.txt, chr2.snps.txt ...
# Format: position  ref_allele  alt_allele
# Generated from vcf_raw by vcf_prep_snp_dir rule
snp_dir: "resources/snp_dir"


# ── QC and trimming ───────────────────────────────────────────
# Trimming parameters per data type.
# Adjust after reviewing raw FastQC / MultiQC reports.
fastp:
  RNA-seq:
    min_length: 36
    quality: 20
    threads: 4
  ATAC-seq:
    min_length: 25
    quality: 20
    threads: 4
  ChIP-seq:
    min_length: 25
    quality: 20
    threads: 4
  MOA-seq:
    min_length: 25
    quality: 20
    threads: 4

# Advanced: extra flags appended verbatim to the fastp command
# Leave empty unless you know what you are doing
extra_fastp_params: ""
# Example: "--trim_poly_g --low_complexity_filter"


# ── Index creation (one-time setup) ──────────────────────────
# If indices already exist, point the paths below to them —
# index creation rules will be skipped automatically.
# If not, build them before running the main pipeline:
#   snakemake build_star_index    --cores 8 --use-conda
#   snakemake build_bowtie2_index --cores 8 --use-conda
#
# Resource requirements (maize genome ~2.4 Gb):
#   STAR index:    ~30-60 min, ~30 Gb RAM
#   bowtie2 index: ~15-30 min, ~8 Gb RAM

# sjdbOverhang: default 100 works well for most read lengths
# including 150 bp. Reduce to (read_length - 1) only if reads
# are shorter than 75 bp.
star_sjdb_overhang: 100

# Advanced: extra flags for index building
extra_star_index_params: ""
extra_bowtie2_index_params: ""


# ── Alignment ────────────────────────────────────────────────
# Reference genome and annotation
genome_fasta: "resources/genome.fa"
genome_gtf:   "resources/annotation.gtf"

# STAR index directory (for RNA-seq)
star_index: "resources/star_index"

# Bowtie2 index prefix (for ATAC-seq, ChIP-seq, MOA-seq)
bowtie2_index: "resources/bowtie2_index/genome"

# STAR parameters (RNA-seq)
# The following flags are hardcoded and cannot be changed:
#   --twopassMode Basic          improved junction detection
#                                ~2x runtime, ~30-50 Gb temp/sample
#   --waspOutputMode SAMtag      inline WASP bias correction
#   --outSAMtype BAM SortedByCoordinate
#   --outSAMattributes NH HI AS NM MD vA vW
star_threads: 8
star_max_multimappers: 1    # --outFilterMultimapNmax: discard multimappers
star_mapq_unique: 255       # --outSAMmapqUnique: MAPQ label for unique mappers
                            # phASER uses phaser_mapq_rnaseq: 255 to match

# Advanced: extra flags appended verbatim to the STAR command
extra_star_params: ""
# Example: "--outWigType bedGraph"

# Bowtie2 parameters (ATAC-seq, ChIP-seq, MOA-seq)
# Bowtie2 uses score-based MAPQ (0-42), not 255 for unique mappers.
# Reads below bowtie2_mapq are discarded before WASP filtering.
bowtie2_threads: 8
bowtie2_mapq: 30            # verify with your data; 30 recommended for ASE

# Advanced: extra flags appended verbatim to the bowtie2 command
extra_bowtie2_params: ""
# Example: "--very-sensitive"


# ── WASP ─────────────────────────────────────────────────────
# Path to cloned WASP repository (one-time setup on HPC)
# git clone https://github.com/bmvdgeijn/WASP.git resources/wasp
wasp_dir: "resources/wasp"

# WASP standalone is used for ATAC-seq, ChIP-seq, MOA-seq only.
# RNA-seq uses STAR+WASP inline (--waspOutputMode SAMtag).
# Intermediate temp files are automatically deleted after each step.


# ── phASER per-sample ─────────────────────────────────────────
# Review per-sample outputs before running phaser_pop.
# Check: coverage, biallelic rate, ref/alt ratio.

# MAPQ thresholds — must match the aligner's scale:
#   RNA-seq BAMs:        255 = STAR unique mappers (matches star_mapq_unique)
#   ATAC/ChIP/MOA BAMs:   30 = consistent with bowtie2_mapq above
phaser_mapq_rnaseq: 255
phaser_mapq_other: 30

phaser_baseq: 10            # discard bases with Phred quality below this
phaser_paired_end: 1        # 1 = paired-end (required for this pipeline)
phaser_unphased_vars: 1     # include unphased variants in allele counting
phaser_pass_only: 0         # 0 = use all variants regardless of FILTER field

# Minimum read coverage per het-SNP to report allele counts
min_coverage: 10

# Empirical null for binomial test (accounts for residual reference
# mapping bias after WASP). Calculate from your own dataset.
# ~0.508 is typical after WASP correction.
empirical_null: 0.508

# Advanced: extra flags appended verbatim to the phASER command
extra_phaser_params: ""
# Example: "--haplo_count_blacklist resources/blacklist.bed"


# ── phASER population-level ───────────────────────────────────
# IMPORTANT: Fill ONLY after reviewing per-sample QC outputs.
# Include only samples that passed QC:
#   - biallelic rate >= min_biallelic_rate
#   - ref/alt ratio within expected range
#   - sufficient coverage at het-SNPs
phaser_pop_samples: []
# Example after QC review:
# phaser_pop_samples:
#   - "sample1"
#   - "sample2"
#   - "sample3"


# ── QC plots ─────────────────────────────────────────────────
# Thresholds for flagging samples in QC plots.
# Visualization only — not hard filters on the output data.
min_biallelic_rate: 0.85    # flag samples below this
max_ref_ratio: 1.10         # flag samples with ref bias above this
min_ref_ratio: 0.90         # flag samples with unexpected alt bias
effect_size_cutoff: 0.15    # minimum |ref_ratio - 0.5| to call ASE
