# ============================================================
# ASE Pipeline Configuration
# ============================================================

# --- Sample sheet ---
samples: "config/samples.tsv"

# --- Reference files ---
genome_fasta: "resources/genome.fa"
genome_gtf:   "resources/annotation.gtf"
star_index:   "resources/star_index"

# --- VCF files ---
vcf_wasp:    "resources/variants_wasp.vcf"
vcf_phaser:  "resources/variants_phased.vcf.gz"

# --- fastp parameters ---
fastp_threads: 4
fastp_min_length: 36
fastp_quality: 20

# --- STAR parameters ---
star_threads: 8
star_mapq_unique: 60
star_max_multimappers: 1

# --- phASER parameters ---
phaser_mapq: 60
phaser_baseq: 10
phaser_unphased_vars: 1
phaser_pass_only: 0

# --- QC thresholds ---
min_coverage: 10
empirical_null: 0.508
max_ref_ratio: 1.10
min_ref_ratio: 0.90
min_biallelic_rate: 0.85
