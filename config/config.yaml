# ============================================================
# Plant Hybrid ASE Pipeline — Configuration File
# ============================================================
# Fill in paths and parameters before running each stage.
# Each section corresponds to one pipeline stage.
# Review outputs of each stage before proceeding to the next.
# ============================================================

# ── Sample sheet ─────────────────────────────────────────────
samples: "config/samples.tsv"

# ── Entry point ──────────────────────────────────────────────
# Define where your data enters the pipeline.
# Options:
#   fastq      → start from raw FASTQs (runs all stages)
#   trimmed    → start from trimmed FASTQs (skip Stages 1-2)
#   bam        → start from aligned BAMs (skip Stages 1-4)
#   wasp_bam   → start from WASP-filtered BAMs (skip Stages 1-5)
#   counts     → start from phASER counts (Stage 6 only)
start_from: "fastq"


# ── Stage 0: VCF preparation ─────────────────────────────────
# Input VCF (bgzipped + tabix indexed).
# Can be single-sample or multi-sample:
#
#   Single-sample: VCF created by aligning Parent B to Parent A genome.
#                  One sample column in the VCF (e.g. "Oh43").
#                  The same SNP set is applied to all hybrid samples.
#                  In samples.tsv, set vcf_sample to this one name for every row.
#
#   Multi-sample:  VCF with one genotype column per hybrid sample
#                  (e.g. from GATK joint genotyping).
#                  In samples.tsv, set vcf_sample to the matching VCF column
#                  name for each row.
vcf_raw: "resources/variants.vcf.gz"

# Output VCFs generated by Stage 0 (do not edit paths)
# vcf_wasp   → unzipped, 0/1 genotypes, for STAR+WASP inline
# vcf_phaser → bgzipped + tabix indexed, phased 0|1, for phASER
vcf_wasp:   "resources/variants_wasp.vcf"
vcf_phaser: "resources/variants_phased.vcf.gz"

# SNP directory for WASP standalone (ATAC/ChIP/MOA)
# One file per chromosome: chr1.snps.txt, chr2.snps.txt ...
# Format: 3 columns — position RefAllele AltAllele
# Generated by Stage 0 from vcf_raw
snp_dir: "resources/snp_dir"


# ── Stage 1-3: QC and trimming ───────────────────────────────
# Trimming parameters per data type
# Adjust after reviewing raw FastQC / MultiQC reports
fastp:
  RNA-seq:
    min_length: 36
    quality: 20
    threads: 4
  ATAC-seq:
    min_length: 25
    quality: 20
    threads: 4
  ChIP-seq:
    min_length: 25
    quality: 20
    threads: 4
  MOA-seq:
    min_length: 25
    quality: 20
    threads: 4

# Advanced: extra flags appended verbatim to the fastp command
# Leave empty unless you know what you are doing
extra_fastp_params: ""
# Example: "--trim_poly_g --low_complexity_filter"


# ── Stage 4: Alignment ───────────────────────────────────────
# Reference genome and annotation
genome_fasta: "resources/genome.fa"
genome_gtf:   "resources/annotation.gtf"

# STAR index (for RNA-seq)
star_index:   "resources/star_index"

# Bowtie2 index prefix (for ATAC-seq, ChIP-seq, MOA-seq)
bowtie2_index: "resources/bowtie2_index/genome"

# STAR parameters (RNA-seq)
# The following flags are hardcoded in the pipeline and cannot be changed:
#   --twopassMode Basic         → two-pass alignment for improved junction detection
#                                 note: increases runtime ~2x and disk ~30-50 Gb/sample
#   --waspOutputMode SAMtag     → WASP bias correction inline during alignment
#   --outSAMtype BAM SortedByCoordinate
#   --outSAMattributes NH HI AS NM MD vA vW
# User-tunable parameters below:
star_threads: 8
star_max_multimappers: 1    # --outFilterMultimapNmax: discard multimappers
star_mapq_unique: 255       # --outSAMmapqUnique: MAPQ label for unique mappers
                            # phASER uses phaser_mapq_rnaseq: 255 to match this

# Advanced: extra flags appended verbatim to the STAR command
# Leave empty unless you know what you are doing
extra_star_params: ""
# Example: "--outWigType bedGraph"

# Bowtie2 parameters (ATAC-seq, ChIP-seq, MOA-seq)
# Bowtie2 uses a score-based MAPQ scale (0-42), not 255 for unique mappers.
# Reads below bowtie2_mapq are discarded before WASP standalone filtering.
# phASER uses phaser_mapq_other (same value) for these BAMs.
bowtie2_threads: 8
bowtie2_mapq: 30            # verify with your data; 30 is recommended for ASE

# Advanced: extra flags appended verbatim to the bowtie2 command
# Leave empty unless you know what you are doing
extra_bowtie2_params: ""
# Example: "--no-mixed --no-discordant"


# ── Stage 5: WASP ────────────────────────────────────────────
# Path to cloned WASP repository (one-time setup on HPC)
# git clone https://github.com/bmvdgeijn/WASP.git resources/wasp
wasp_dir: "resources/wasp"

# WASP standalone is used for ATAC-seq, ChIP-seq, MOA-seq only.
# RNA-seq uses STAR+WASP inline (--waspOutputMode SAMtag); no extra config needed.
# Temp files from WASP standalone are automatically deleted after each step.


# ── Stage 6: phASER per-sample ───────────────────────────────
# Review per-sample allele counts before running Stage 7.
# Check: coverage, biallelic rate, ref/alt ratio.

# MAPQ thresholds for phASER -- must match the aligner's scale:
#   RNA-seq BAMs:        255 = STAR unique mappers only (matches star_mapq_unique)
#   ATAC/ChIP/MOA BAMs:   30 = consistent with bowtie2_mapq above
phaser_mapq_rnaseq: 255
phaser_mapq_other: 30

phaser_baseq: 10            # discard bases with Phred quality below this
phaser_paired_end: 1        # 1 = paired-end reads (required for this pipeline)
phaser_unphased_vars: 1     # include unphased variants in allele counting
phaser_pass_only: 0         # 0 = use all variants regardless of FILTER field

# Minimum read coverage per het-SNP to report allele counts
min_coverage: 10

# Empirical null for binomial test (accounts for residual
# reference mapping bias after WASP; ~0.508 for most datasets)
# Calculate per dataset from Stage 5 QC output
empirical_null: 0.508

# Advanced: extra flags appended verbatim to the phASER command
# Leave empty unless you know what you are doing
extra_phaser_params: ""
# Example: "--haplo_count_blacklist resources/blacklist.bed"


# ── Stage 7: phASER population-level ─────────────────────────
# IMPORTANT: Fill this section ONLY after reviewing Stage 6
# outputs for all samples. List only samples that passed QC:
#   - biallelic rate >= min_biallelic_rate
#   - ref/alt ratio within expected range
#   - sufficient coverage at het-SNPs
#
# Samples not listed here will be excluded from the
# population-level matrix regardless of whether Stage 6 ran.
phaser_pop_samples: []
# Example after QC review:
# phaser_pop_samples:
#   - "sample1"
#   - "sample2"
#   - "sample3"


# ── Stage 8: QC plots ────────────────────────────────────────
# Thresholds for filtering and flagging samples in QC plots.
# These are used for visualization only -- not hard filters
# on the allele count output.
min_biallelic_rate: 0.85    # flag samples below this
max_ref_ratio: 1.10         # flag samples with ref bias above this
min_ref_ratio: 0.90         # flag samples with unexpected alt bias
effect_size_cutoff: 0.15    # minimum |ref_ratio - 0.5| to call ASE
