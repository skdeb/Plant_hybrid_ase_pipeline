name: phaser
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - pip
  - pysam=0.22.1
  - scipy=1.14.1
  - numpy=2.1.3
  - pandas=2.2.3
  - intervaltree=3.1.0
  - bedtools=2.31.1
  - samtools=1.23
  - bcftools=1.23
  - htslib=1.23
  - pip:
      # bioconda phaser package is stale (2023). Install directly from GitHub.
      - git+https://github.com/secastel/phaser.git#subdirectory=phaser
